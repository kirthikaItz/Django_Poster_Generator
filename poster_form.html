<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Poster Creator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: #764ba2;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #5a3782;
            transform: translateY(-2px);
        }
        .form-label { font-weight: 600; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4">
                    <h2 class="text-center mb-4" style="color: #764ba2;">✨ Poster Generator</h2>
                    <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Event Title</label>
        <input type="text" name="title" class="form-control" placeholder="e.g. Future of AI" required>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Speaker</label>
            <input type="text" name="speaker" class="form-control" placeholder="Dr. Jane Doe" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Coordinator</label>
        <input type="text" name="coordinator" class="form-control" placeholder="John Smith" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Recipient Email</label>
        <input type="email" name="email" class="form-control" placeholder="where should we send the poster?" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Event Description</label>
        <textarea name="description" class="form-control" rows="3" placeholder="Type a description... it will wrap automatically!"></textarea>
    </div>

    <button type="submit" class="btn btn-primary w-100 shadow-sm">Generate & Preview</button>
</form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
