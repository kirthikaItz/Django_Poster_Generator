<!DOCTYPE html>
<html>
<head>
    <title>Preview Your Poster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: white; text-align: center; padding-top: 30px; }
        .poster-preview { 
            max-width: 450px; 
            border: 4px solid #00ffff; 
            border-radius: 10px; 
            box-shadow: 0 0 20px #00ffff;
        }
    </style>
</head>
<body>
    <h2>Check Your Design</h2>
    <img src="{{ image_url }}" class="poster-preview mb-4">
    
    <form method="POST">
    {% csrf_token %}
    <input type="hidden" name="filename" value="{{ filename }}">
    <input type="hidden" name="email" value="{{ email }}">
    <input type="hidden" name="title" value="{{ title }}">
    
    <div class="mt-3">
        <button type="submit" name="confirm_send" class="btn btn-info btn-lg px-5">
            ✅ Looks Good, Send Email!
        </button>
    </div>
</form>
</body>
</html>
